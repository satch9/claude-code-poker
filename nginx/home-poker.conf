# Conf nginx pour home-poker.vjdev.tech
#
# Première installation :
#   1. sudo ln -s /var/www/vincent/claude-code-poker/nginx/home-poker.conf \
#                 /etc/nginx/sites-enabled/home-poker.vjdev.tech
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo certbot --nginx -d home-poker.vjdev.tech
#      (certbot ajoutera automatiquement le bloc HTTPS et la redirection 301)
#
# Frontend statique uniquement. Le backend tourne sur Convex Cloud
# (https://incredible-hedgehog-551.convex.cloud). Le navigateur s'y connecte
# directement, donc pas de proxy nécessaire côté nginx.

server {
    listen 80;
    listen [::]:80;
    server_name home-poker.vjdev.tech;

    # Frontend Vite (build statique)
    root /var/www/vincent/claude-code-poker/dist;
    index index.html;

    # SPA React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html jamais en cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets hashés par Vite : cache long terme
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers de sécurité (équivalent downlineapp)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Logs
    access_log /var/log/nginx/home-poker_access.log;
    error_log  /var/log/nginx/home-poker_error.log;
}
